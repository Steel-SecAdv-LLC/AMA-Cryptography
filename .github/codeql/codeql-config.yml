name: "AMA Cryptography CodeQL"

# CodeQL settings for the static-analysis CodeQL Security Analysis job.
# Wired up via `config-file:` on github/codeql-action/init.
#
# paths-ignore: third-party vendored code is intentionally not analyzed.
#   - src/c/vendor/ed25519-donna/ : public-domain ed25519-donna by
#     Andrew Moon. The upstream donna sources are kept unmodified;
#     AMA adds one project-local aggregator header in this directory
#     (ama_donna_unit.h) for build/analysis integration only — see the
#     query-filters note below. We compile donna as a single
#     translation unit through src/c/ed25519_donna_shim.c (donna's own
#     -DED25519_REFHASH / -DED25519_CUSTOMRANDOM single-unit pattern)
#     and gate cross-checks via the AMA_ED25519_ASSEMBLY build flag.
#     CodeQL's `cpp/include-non-header` and `cpp/unused-static-variable`
#     fire on the upstream vendor headers (e.g. unused reduce_mask_40 /
#     reduce_mask_56 in curve25519-donna-64bit.h, which are referenced
#     by the variant the vendor library compiles for other targets).
#     These are upstream cosmetics in code we deliberately don't fork.

paths-ignore:
  - "src/c/vendor/**"

# Disable `cpp/include-non-header` project-wide. The only place we
# include a `.c` file is the donna single-translation-unit pattern,
# which lives in `src/c/vendor/ed25519-donna/ama_donna_unit.h` (a
# vendor-tree aggregator that exists solely to keep the directive in
# vendor code). Even though the file is path-ignored, CodeQL still
# reports the directive at its source location, so a project-wide
# rule disable is the only way to silence the alert without
# restructuring vendor code we ship unmodified.
query-filters:
  - exclude:
      id: cpp/include-non-header
