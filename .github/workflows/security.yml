name: Security Scanning

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-audit:
    name: Python Security Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit pip-audit

    - name: Run pip-audit
      # CVE-2026-4539: ReDoS in pygments AdlLexer (local access only, no fix version yet).
      # pygments is a transitive dev dependency (via rich/bandit) — not used at runtime.
      # See INVARIANT-14 for review cadence.  Remove ignore when Pygments >2.20.0 ships a fix.
      run: |
        pip-audit --desc --ignore-vuln CVE-2026-4539

    - name: Run Bandit security linter
      run: |
        bandit -r ama_cryptography/ -f json -o bandit-report.json -l
        bandit -r ama_cryptography/ -l

    - name: Upload security reports
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
        retention-days: 90

  # INVARIANT-11: SBOM generation is required for release tags.
  # Requires adding this job to required status checks via branch/tag protection rules.
  sbom:
    name: SBOM Generation (CycloneDX)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "cyclonedx-bom==7.2.2" pip-audit
        pip install -r requirements-lock.txt

    - name: Generate Python SBOM (CycloneDX)
      run: |
        cyclonedx-py environment \
          -o sbom-python.json \
          --of JSON

    - name: Generate dependency tree
      run: |
        pip list --format=json > pip-list.json

    - name: Run dependency audit
      # CVE-2026-4539: ReDoS in pygments AdlLexer (dev-only, local access, not used at runtime).
      # pygments is a transitive dev dependency (via rich/bandit) — see INVARIANT-14.
      # Remove ignore when Pygments >2.20.0 ships a fix.
      run: |
        pip-audit --format=json --output pip-audit.json --ignore-vuln CVE-2026-4539

    - name: Upload audit results
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
      with:
        name: pip-audit-results
        path: pip-audit.json

    - name: Annotate SBOM status
      run: |
        echo "::warning::SBOM C-library component uses static metadata — version and purl fields must be updated on each release"

    - name: Create C library SBOM component
      run: |
        cat > sbom-c-library.json << 'SBOM_EOF'
        {
          "bomFormat": "CycloneDX",
          "specVersion": "1.5",
          "serialNumber": "urn:uuid:ama-cryptography-c-library",
          "version": 1,
          "metadata": {
            "component": {
              "type": "library",
              "name": "ama-cryptography",
              "version": "2.1.2",
              "description": "Quantum-resistant cryptographic protection system",
              "licenses": [{"license": {"id": "Apache-2.0"}}],
              "supplier": {"name": "Steel Security Advisors LLC"}
            }
          },
          "components": [
            {
              "type": "library",
              "name": "ama_sha3",
              "version": "2.1.2",
              "description": "SHA3-256/512, SHAKE128/256 (NIST FIPS 202)",
              "scope": "required",
              "purl": "pkg:generic/ama_sha3@2.1.2"
            },
            {
              "type": "library",
              "name": "ama_ed25519",
              "version": "2.1.2",
              "description": "Ed25519 digital signatures (RFC 8032)",
              "scope": "required",
              "purl": "pkg:generic/ama_ed25519@2.1.2"
            },
            {
              "type": "library",
              "name": "ama_dilithium",
              "version": "2.1.2",
              "description": "ML-DSA-65 post-quantum signatures (NIST FIPS 204)",
              "scope": "required",
              "purl": "pkg:generic/ama_dilithium@2.1.2"
            },
            {
              "type": "library",
              "name": "ama_kyber",
              "version": "2.1.2",
              "description": "Kyber-1024 ML-KEM (NIST FIPS 203)",
              "scope": "required",
              "purl": "pkg:generic/ama_kyber@2.1.2"
            },
            {
              "type": "library",
              "name": "ama_sphincs",
              "version": "2.1.2",
              "description": "SPHINCS+-256f SLH-DSA (NIST FIPS 205)",
              "scope": "required",
              "purl": "pkg:generic/ama_sphincs@2.1.2"
            },
            {
              "type": "library",
              "name": "ama_aes_gcm",
              "version": "2.1.2",
              "description": "AES-256-GCM AEAD (NIST SP 800-38D)",
              "scope": "required",
              "purl": "pkg:generic/ama_aes_gcm@2.1.2"
            },
            {
              "type": "library",
              "name": "ama_chacha20poly1305",
              "version": "2.1.2",
              "description": "ChaCha20-Poly1305 AEAD (RFC 8439)",
              "scope": "required",
              "purl": "pkg:generic/ama_chacha20poly1305@2.1.2"
            },
            {
              "type": "library",
              "name": "ama_x25519",
              "version": "2.1.2",
              "description": "X25519 ECDH key exchange (RFC 7748)",
              "scope": "required",
              "purl": "pkg:generic/ama_x25519@2.1.2"
            },
            {
              "type": "library",
              "name": "ama_argon2",
              "version": "2.1.2",
              "description": "Argon2id password hashing (RFC 9106)",
              "scope": "required",
              "purl": "pkg:generic/ama_argon2@2.1.2"
            },
            {
              "type": "library",
              "name": "ama_hkdf",
              "version": "2.1.2",
              "description": "HKDF-SHA3-256 key derivation (RFC 5869)",
              "scope": "required",
              "purl": "pkg:generic/ama_hkdf@2.1.2"
            },
            {
              "type": "library",
              "name": "ama_secp256k1",
              "version": "2.1.2",
              "description": "secp256k1 elliptic curve operations",
              "scope": "required",
              "purl": "pkg:generic/ama_secp256k1@2.1.2"
            }
          ],
          "dependencies": []
        }
        SBOM_EOF

    - name: Upload SBOM artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
      with:
        name: sbom
        path: |
          sbom-python.json
          sbom-c-library.json
          pip-list.json
          pip-audit.json
        retention-days: 90

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        fetch-depth: 0

    - name: TruffleHog Secret Scanning
      uses: trufflesecurity/trufflehog@6bd2d14f7a4bc1e569fa3550efa7ec632a4fa67b  # v3.94.2
      with:
        path: ./
        extra_args: --debug --only-verified
