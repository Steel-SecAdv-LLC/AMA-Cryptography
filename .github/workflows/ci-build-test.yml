name: CI - Build and Test

on:
  push:
    branches: [ main, develop, 'claude/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  # C Library Build and Test
  c-library:
    name: C Library (${{ matrix.os }}, ${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc-11
            cxx: g++-11
          - os: ubuntu-latest
            compiler: clang
            cc: clang-14
            cxx: clang++-14
          - os: macos-latest
            compiler: gcc
            cc: gcc-12
            cxx: g++-12
          - os: macos-latest
            compiler: clang
            cc: clang
            cxx: clang++

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ${{ matrix.cc }} ${{ matrix.cxx }}

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake gcc@12

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          # Set compiler path
          if [ "$RUNNER_OS" = "macOS" ]; then
            # For GCC on macOS, use full path
            if [ "${{ matrix.compiler }}" = "gcc" ]; then
              CC_PATH=$(brew --prefix gcc@12)/bin/gcc-12
              CXX_PATH=$(brew --prefix gcc@12)/bin/g++-12
            else
              CC_PATH=${{ matrix.cc }}
              CXX_PATH=${{ matrix.cxx }}
            fi
          else
            CC_PATH=${{ matrix.cc }}
            CXX_PATH=${{ matrix.cxx }}
          fi

          cmake .. \
            -DCMAKE_C_COMPILER=${CC_PATH} \
            -DCMAKE_CXX_COMPILER=${CXX_PATH} \
            -DCMAKE_BUILD_TYPE=Release \
            -DAMA_BUILD_SHARED=ON \
            -DAMA_BUILD_STATIC=ON \
            -DAMA_BUILD_TESTS=ON \
            -DAMA_ENABLE_AVX2=ON

      - name: Build
        run: cmake --build build --config Release -j4

      - name: Test
        run: cd build && ctest --output-on-failure

  # Python Package Build and Test
  python-package:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev cmake libssl-dev

      - name: Install system dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install cmake

      - name: Install system dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y

      - name: Build native C library (Ubuntu/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cmake -B build -DAMA_USE_NATIVE_PQC=ON -DCMAKE_BUILD_TYPE=Release -DAMA_BUILD_TESTS=OFF -DAMA_BUILD_EXAMPLES=OFF
          cmake --build build -j4

      - name: Build native C library (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cmake -B build -DAMA_USE_NATIVE_PQC=ON -DCMAKE_BUILD_TYPE=Release -DAMA_BUILD_TESTS=OFF -DAMA_BUILD_EXAMPLES=OFF
          cmake --build build --config Release -j4

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "Cython>=0.29.30" "numpy>=1.21"

      - name: Install Python dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Build and install package
        run: pip install -e .

      - name: Run tests
        env:
          # UTF-8 encoding for Windows to support Unicode symbols in output
          PYTHONIOENCODING: ${{ matrix.os == 'windows-latest' && 'utf-8' || '' }}
          PYTHONUTF8: ${{ matrix.os == 'windows-latest' && '1' || '' }}
        run: pytest tests/ -v --cov=ama_cryptography --cov-report=xml

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: python
          name: python-${{ matrix.python-version }}

  # Linting and Code Quality
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install "black==25.11.0" "flake8>=7.0,<8" "mypy>=1.9,<2" "isort>=5.13,<6"

      - name: Check formatting (black)
        run: black --check --diff ama_cryptography/ tests/

      - name: Check import sorting (isort)
        run: isort --check-only --diff ama_cryptography/ tests/

      - name: Lint (flake8)
        run: flake8 ama_cryptography/ tests/ --max-line-length=100

      - name: Type check (mypy)
        run: mypy ama_cryptography/ --ignore-missing-imports
        continue-on-error: false

  # Security Audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pip-audit bandit safety

      - name: Audit dependencies
        run: pip-audit
        continue-on-error: true

      - name: Security scan (bandit)
        run: bandit -r ama_cryptography/ -ll
        continue-on-error: true

  # Docker Build
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Ubuntu image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: false
          load: true
          tags: ama-cryptography:ubuntu
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Alpine image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.alpine
          push: false
          load: true
          tags: ama-cryptography:alpine
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Ubuntu image
        run: |
          docker run --rm ama-cryptography:ubuntu python3 -c "import ama_cryptography; print('OK')"

      - name: Test Alpine image
        run: |
          docker run --rm ama-cryptography:alpine python3 -c "import ama_cryptography; print('OK')"
