name: CI - Testing and Code Quality

on:
  push:
    branches: [ main, develop, 'claude/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake

    - name: Build native C library
      run: |
        cmake -B build -DAMA_USE_NATIVE_PQC=ON -DCMAKE_BUILD_TYPE=Release -DAMA_BUILD_TESTS=OFF -DAMA_BUILD_EXAMPLES=OFF
        cmake --build build -j$(nproc)

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -e ".[dev]"

    - name: Run pytest test suite
      run: |
        python -m pytest tests/ -v --tb=short --no-cov

    - name: Run NIST KAT tests (if oqs available)
      run: |
        if python -c "import oqs"; then
          echo "oqs available — running KAT tests (hard-fail)"
          python -m pytest tests/test_pqc_kat.py -v --tb=short
        else
          echo "::warning::oqs not available — skipping KAT tests"
        fi

    - name: Run demonstration
      run: |
        python code_guardian_secure.py

    - name: Verify demonstration output
      run: |
        python -c "
        import subprocess
        import sys

        result = subprocess.run(['python', 'code_guardian_secure.py'],
                              capture_output=True, text=True, timeout=60)

        if result.returncode != 0:
            print('ERROR: Demonstration failed')
            print(result.stderr)
            sys.exit(1)

        output = result.stdout

        # Verify critical outputs
        checks = [
            ('AMA Cryptography', 'Title present'),
            ('Generating key management system', 'Key generation'),
            ('Creating Omni-Code cryptographic package', 'Package creation'),
            ('Signing package', 'Signing process'),
            ('Verifying cryptographic package', 'Verification'),
            ('ALL VERIFICATIONS PASSED', 'Success confirmation')
        ]

        failed = []
        for check, desc in checks:
            if check not in output:
                failed.append(f'{desc}: \"{check}\" not found')

        if failed:
            print('ERROR: Output validation failed:')
            for fail in failed:
                print(f'  - {fail}')
            sys.exit(1)

        print('All verification checks passed')
        "

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "black==26.3.1" "ruff>=0.4" "isort>=5.13,<6" "mypy>=1.9,<2"

    - name: Lint with ruff
      run: |
        ruff check .

    - name: Check code formatting with Black
      run: |
        black --check --diff .

    - name: Check import order with isort
      run: |
        isort --check-only --diff ama_cryptography/ tests/ code_guardian_secure.py

    - name: Type checking with MyPy (--strict)
      continue-on-error: false
      run: |
        mypy --strict ama_cryptography/ tests/

  security-checks:
    name: Security Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit

    - name: Check dependencies for vulnerabilities with Safety
      run: |
        safety check --json

    - name: Security linting with Bandit
      run: |
        bandit -r ama_cryptography/ -l -f json -o bandit-report.json
        bandit -r ama_cryptography/ -l

    - name: Upload Bandit report
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      if: always()
      with:
        name: bandit-security-report
        path: bandit-report.json

    - name: Semgrep security scan (reporting only)
      continue-on-error: true
      run: |
        pip install semgrep
        semgrep --config .semgrep.yml ama_cryptography/ --json -o semgrep-report.json
        semgrep --config .semgrep.yml ama_cryptography/

    - name: Upload Semgrep report
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      if: always()
      with:
        name: semgrep-security-report
        path: semgrep-report.json

  benchmark-regression:
    name: Benchmark Regression Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake

    - name: Build native C library
      run: |
        cmake -B build -DAMA_USE_NATIVE_PQC=ON -DCMAKE_BUILD_TYPE=Release -DAMA_BUILD_TESTS=OFF -DAMA_BUILD_EXAMPLES=OFF
        cmake --build build -j$(nproc)

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run benchmark regression tests
      run: |
        python benchmarks/benchmark_runner.py --verbose --output benchmark-results.json --markdown benchmark-report.md

    - name: Upload benchmark results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      if: always()
      with:
        name: benchmark-results
        path: |
          benchmark-results.json
          benchmark-report.md

  constant-time-check:
    name: Constant-Time Verification (Smoke Test)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake

    - name: Build C library
      run: |
        mkdir -p build
        cd build
        cmake ..
        make

    - name: Build and run dudect harnesses
      run: |
        cd tools/constant_time
        make clean
        make all
        # Run smoke tests with 50K iterations (faster for CI)
        echo "=== Utility function timing analysis ==="
        ./dudect_harness 50000
        echo "=== Crypto primitive timing analysis ==="
        ./dudect_crypto 50000

    - name: Upload timing analysis results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
      if: always()
      with:
        name: constant-time-results
        path: tools/constant_time/
