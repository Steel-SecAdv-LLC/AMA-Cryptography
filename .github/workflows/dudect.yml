name: CI - dudect Constant-Time Verification

# RULESET / REQUIRED-CHECKS NOTE
# ------------------------------
# This workflow is path-filtered to PRs that touch C source / dudect
# harness code (see `paths:` blocks below).  Audit Issue 11 widened the
# trigger to also include include/** (where ama_dispatch.h declares
# which SIMD slot is taken) and ama_cryptography/** (the Python-side
# nonce state and ctypes shims that select between scalar / SIMD code
# paths).  A change in either of those trees can flip which dispatch
# lane the production library hits at runtime without modifying any
# file under src/c/ — and before this widening the dudect gate would
# silently skip such PRs.
#
# PRs that don't touch any of those paths still won't trigger this
# workflow, so its named jobs do NOT emit a status check on such PRs.
# Consequence for branch rulesets: do NOT add these names to the
# `main` branch's required-status-check list.  A required check that
# is never reported on path-filtered PRs blocks merge indefinitely
# with 'Expected — Waiting for status to be reported'.  Same reasoning
# as `baseline-guard.yml::Enforce baseline.json justification` and the
# wiki-sync job — see PR #289 description ('Deliberately not included')
# for the canonical exclusion list.
#
# The dudect gate still fails closed when it DOES run (no
# `continue-on-error`, no silent skips inside the harness), which is
# the regression case it exists to catch.
#
# The nightly `dudect-simd-sweep` job (added 2026-05 — audit Issue 3)
# runs unconditionally on a cron schedule even when no path-filter
# fires, so the per-PR coverage shrinks to "changed code" and the
# full SIMD dispatch-table sweep happens out of the critical path.
on:
  push:
    branches: [ main, develop, 'feature/**', 'fix/**' ]
    paths:
      - 'src/c/**'
      - 'include/**'
      - 'ama_cryptography/**'
      - 'tests/c/test_dudect.c'
      - 'tests/c/dudect/**'
      - '.github/workflows/dudect.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/c/**'
      - 'include/**'
      - 'ama_cryptography/**'
      - 'tests/c/test_dudect.c'
      - 'tests/c/dudect/**'
  schedule:
    # Run weekly on Sundays at 02:00 UTC (existing schedule).
    - cron: '0 2 * * 0'
    # Nightly SIMD sweep at 03:30 UTC (audit Issue 3) — see
    # `dudect-simd-sweep` job below for the slot inventory.
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      measurements:
        description: 'Number of measurements per test'
        required: false
        default: '100000'

permissions:
  contents: read

# Collapse overlapping runs on the same ref.  Main and the weekly +
# nightly schedules are preserved.
concurrency:
  group: dudect-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.event_name != 'schedule' }}

jobs:
  dudect-utility:
    name: dudect - Utility Functions
    # The four legacy dudect lanes (utility / pqc / legacy-harnesses /
    # x25519-avx2-batch) only fire on:
    #   - push / pull_request (path-filtered above)
    #   - workflow_dispatch (operator-triggered)
    #   - the WEEKLY schedule '0 2 * * 0' (Sunday 02:00 UTC)
    # The new NIGHTLY schedule '30 3 * * *' (audit Issue 3) is for the
    # `dudect-simd-sweep` job only.  Without this guard, every nightly
    # run would also re-execute the four legacy lanes — wasted compute
    # the SIMD sweep doesn't need and explicit operational cost the
    # weekly schedule already covers.  Copilot review #322 follow-up.
    if: |
      github.event_name != 'schedule' ||
      github.event.schedule == '0 2 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list || true
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Build with dudect enabled
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DAMA_ENABLE_DUDECT=ON \
            -DAMA_USE_NATIVE_PQC=ON \
            -DAMA_ENABLE_LTO=OFF \
            -DAMA_BUILD_EXAMPLES=OFF
          cmake --build build -j$(nproc)

      - name: Run dudect tests (utility functions)
        env:
          MEASUREMENTS: ${{ github.event.inputs.measurements || '100000' }}
        run: |
          # Pin to single core and elevate priority to reduce noise
          taskset -c 0 nice -n -10 \
            ./build/bin/test_dudect --measurements "$MEASUREMENTS" --timeout 300

  dudect-pqc:
    name: dudect - PQC Primitives
    # Same legacy-lane schedule guard as dudect-utility — see that
    # job's header for rationale.
    if: |
      github.event_name != 'schedule' ||
      github.event.schedule == '0 2 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list || true
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Build with dudect and PQC enabled
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DAMA_ENABLE_DUDECT=ON \
            -DAMA_USE_NATIVE_PQC=ON \
            -DAMA_AES_CONSTTIME=ON \
            -DAMA_ENABLE_LTO=OFF \
            -DAMA_BUILD_EXAMPLES=OFF
          cmake --build build -j$(nproc)

      - name: Run dudect tests (all functions incl. PQC)
        env:
          MEASUREMENTS: ${{ github.event.inputs.measurements || '100000' }}
        run: |
          taskset -c 0 nice -n -10 \
            ./build/bin/test_dudect --measurements "$MEASUREMENTS" --timeout 600

  dudect-legacy-harnesses:
    name: dudect - Legacy Harnesses (tools/constant_time)
    # Same legacy-lane schedule guard as dudect-utility.
    if: |
      github.event_name != 'schedule' ||
      github.event.schedule == '0 2 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list || true
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Build C library
        run: |
          cmake -B build -DAMA_USE_NATIVE_PQC=ON -DAMA_ENABLE_LTO=OFF
          cmake --build build -j$(nproc)

      - name: Build and run legacy dudect harnesses
        run: |
          cd tools/constant_time
          make clean && make all
          echo "=== Utility function timing analysis ==="
          taskset -c 0 nice -n -10 ./dudect_harness 50000
          echo "=== Crypto primitive timing analysis ==="
          taskset -c 0 nice -n -10 ./dudect_crypto 50000

  dudect-x25519-avx2-batch:
    # Re-runs the dudect binary with AMA_DISPATCH_USE_X25519_AVX2=1 so
    # the `X25519 scalarmult batch×4` lane actually exercises the
    # 4-way AVX2 kernel rather than four sequential scalar ladders.
    # Without this opt-in, the batch lane measures the scalar path
    # (the dispatcher leaves x25519_x4 NULL by default — see
    # CHANGELOG [3.0.0] §Performance for the rationale) and the SIMD
    # kernel's constant-time signal is never sampled in CI.
    name: dudect - X25519 AVX2 4-way (opt-in)
    # Same legacy-lane schedule guard as dudect-utility.
    if: |
      github.event_name != 'schedule' ||
      github.event.schedule == '0 2 * * 0'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list || true
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Build with dudect enabled
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DAMA_ENABLE_DUDECT=ON \
            -DAMA_USE_NATIVE_PQC=ON \
            -DAMA_ENABLE_LTO=OFF \
            -DAMA_BUILD_EXAMPLES=OFF
          cmake --build build -j$(nproc)

      - name: Run dudect with X25519 AVX2 4-way kernel wired in
        env:
          MEASUREMENTS: ${{ github.event.inputs.measurements || '100000' }}
          AMA_DISPATCH_USE_X25519_AVX2: '1'
        run: |
          taskset -c 0 nice -n -10 \
            ./build/bin/test_dudect --measurements "$MEASUREMENTS" --timeout 300

  # ===========================================================================
  # SIMD sweep — per-slot, nightly cron (audit Issue 3 deferral close-out)
  # ===========================================================================
  #
  # The four jobs above sample the scalar / generic paths and a single
  # opt-in AVX2 X25519 lane.  Every OTHER dispatch slot needs per-slot
  # isolation so the dudect t-value is attributable to a specific
  # SIMD kernel rather than to "whichever lane the default dispatcher
  # happens to wire on this host".  The audit Issue 3 deferral
  # close-out introduces `AMA_DISPATCH_ONLY=<slot>` env-var
  # (src/c/dispatch/ama_dispatch.c) that wires only the named slot's
  # kernel and scalarizes everything else.  This matrix exercises one
  # slot per cell, plus a control "all-default-dispatch" cell that
  # leaves the dispatcher at its normal post-init wiring.
  #
  # Matrix dimensions:
  #
  #   os    = ubuntu-latest        (x86-64 host)
  #           ubuntu-24.04-arm     (AArch64 host)
  #
  #   slot  = all-default-dispatch  (control — no AMA_DISPATCH_ONLY set)
  #           sha3-avx512x4         (x86-64 only)
  #           kyber-ntt-avx2        (x86-64 only)
  #           dilithium-ntt-avx2    (x86-64 only)
  #           chacha20-avx2x8       (x86-64 only)
  #           argon2-g-avx2         (x86-64 only)
  #           x25519-avx2           (x86-64 only — also needs
  #                                  AMA_DISPATCH_USE_X25519_AVX2=1)
  #           aes-gcm-neon          (AArch64 only)
  #           chacha20-neon         (AArch64 only)
  #           sha3-neon             (AArch64 only)
  #           kyber-sve2            (AArch64 only — auto-skips 77 when
  #                                  the runner lacks SVE2)
  #           sha3-sve2             (AArch64 only — auto-skips 77 when
  #                                  the runner lacks SVE2)
  #
  # When AMA_DISPATCH_ONLY names a slot the host doesn't support, the
  # dispatcher in src/c/dispatch/ama_dispatch.c exits 77 from
  # ama_dispatch_init().  The run step below detects 77 and treats the
  # cell as a Skipped lane — never as a silent pass.
  #
  # If a sweep lane FAILS its strict t-value threshold, the failure is
  # raised as a regular GitHub Actions failure on the schedule run —
  # the project owner reviews it and files a follow-up before merging
  # any new SIMD work.
  dudect-simd-sweep:
    name: dudect - SIMD sweep (${{ matrix.os }} / ${{ matrix.slot }})
    # Fires on:
    #   - the NIGHTLY schedule '30 3 * * *' (audit Issue 3)
    #   - workflow_dispatch (operator-triggered)
    # The WEEKLY '0 2 * * 0' schedule is reserved for the four legacy
    # lanes above; running the sweep on both weekly and nightly would
    # double-bill compute without adding coverage.
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 3 * * *') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
        slot:
          - all-default-dispatch
          - sha3-avx512x4
          - kyber-ntt-avx2
          - dilithium-ntt-avx2
          - chacha20-avx2x8
          - argon2-g-avx2
          - x25519-avx2
          - aes-gcm-neon
          - chacha20-neon
          - sha3-neon
          - kyber-sve2
          - sha3-sve2
        exclude:
          # x86-64 host: NEON / SVE2 slots have no kernel on this arch.
          # The dispatcher would resolve "unavailable" and exit 77,
          # but excluding them statically saves the runner allocation.
          - { os: ubuntu-latest, slot: aes-gcm-neon }
          - { os: ubuntu-latest, slot: chacha20-neon }
          - { os: ubuntu-latest, slot: sha3-neon }
          - { os: ubuntu-latest, slot: kyber-sve2 }
          - { os: ubuntu-latest, slot: sha3-sve2 }
          # AArch64 host: AVX-* slots have no kernel on this arch.
          - { os: ubuntu-24.04-arm, slot: sha3-avx512x4 }
          - { os: ubuntu-24.04-arm, slot: kyber-ntt-avx2 }
          - { os: ubuntu-24.04-arm, slot: dilithium-ntt-avx2 }
          - { os: ubuntu-24.04-arm, slot: chacha20-avx2x8 }
          - { os: ubuntu-24.04-arm, slot: argon2-g-avx2 }
          - { os: ubuntu-24.04-arm, slot: x25519-avx2 }
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list || true
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Build with dudect + every SIMD path the host supports
        run: |
          # AMA_ENABLE_SIMD / NEON / AVX2 default ON in CMakeLists.txt;
          # we set them explicitly here to insulate the sweep from a
          # future change of those defaults.  AVX-512 is opt-in (see
          # CMakeLists.txt:64); enable it on x86-64 so the AVX-512
          # 4-way Keccak kernel is sampled when the runner exposes it.
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DAMA_ENABLE_DUDECT=ON \
            -DAMA_USE_NATIVE_PQC=ON \
            -DAMA_AES_CONSTTIME=ON \
            -DAMA_ENABLE_SIMD=ON \
            -DAMA_ENABLE_AVX2=ON \
            -DAMA_ENABLE_AVX512=ON \
            -DAMA_ENABLE_NEON=ON \
            -DAMA_ENABLE_LTO=OFF \
            -DAMA_BUILD_EXAMPLES=OFF
          cmake --build build -j$(nproc)

      - name: Show dispatch info (which SIMD slots are wired)
        run: |
          # Print the dispatcher's selection before starting timing —
          # surfaces which slots actually got SIMD kernels on this
          # runner (CPUID-gated; e.g., an x86-64 runner without VAES
          # falls back to AES-NI silently, and the dispatcher banner
          # reports the active path).
          ./build/bin/test_dudect --measurements 1000 --timeout 5 || true

      - name: Run dudect (slot=${{ matrix.slot }})
        env:
          MEASUREMENTS: ${{ github.event.inputs.measurements || '100000' }}
          # AMA_DISPATCH_ONLY: empty for the control lane, slot name
          # otherwise.  The dispatcher reads getenv() and filters the
          # dispatch_table to keep only the named slot's kernel wired —
          # see src/c/dispatch/ama_dispatch.c::dispatch_init_internal.
          AMA_DISPATCH_ONLY: ${{ matrix.slot == 'all-default-dispatch' && '' || matrix.slot }}
          # x25519 4-way is opt-in via a separate env var; when the
          # cell targets x25519-avx2, set both.  For other cells, leave
          # USE_X25519_AVX2 unset so the default-dispatch baseline is
          # preserved.
          AMA_DISPATCH_USE_X25519_AVX2: ${{ matrix.slot == 'x25519-avx2' && '1' || '' }}
        run: |
          # Disable -e so we can capture the test_dudect exit code and
          # translate 77 (CTest skip — dispatcher resolved the slot as
          # unavailable on this host) into a non-failing notice.  The
          # dispatcher EXITS 77 from ama_dispatch_init() on first crypto
          # call when the slot is recognized but not wired — that is
          # the documented contract and lets us surface mismatches as
          # Skipped rather than as silent passes.
          set +e
          taskset -c 0 nice -n -10 \
            ./build/bin/test_dudect --measurements "$MEASUREMENTS" --timeout 900
          rc=$?
          set -e
          if [ "$rc" -eq 77 ]; then
            echo "::notice::AMA_DISPATCH_ONLY=${AMA_DISPATCH_ONLY:-(unset)} resolved as unavailable on this host; treating as SKIP."
            exit 0
          fi
          exit "$rc"
