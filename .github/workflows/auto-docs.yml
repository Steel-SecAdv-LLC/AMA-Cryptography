name: Auto-Documentation

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
      - 'wiki/**'

# Cancel duplicate runs — also prevents cascading triggers
concurrency:
  group: auto-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-docs:
    # Skip runs triggered by our own [auto-docs] commits
    if: "!contains(github.event.head_commit.message, '[auto-docs]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 50  # enough history for changelog generation

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'

      - name: Run auto-documentation updater
        run: python tools/update_docs.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "[auto-docs] Update documentation from $(git rev-parse --short HEAD)"
          git push
