name: Auto-Documentation

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
      - 'wiki/**'

# Cancel duplicate runs — also prevents cascading triggers
concurrency:
  group: auto-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docs:
    # Skip runs triggered by our own [auto-docs] commits
    if: "!contains(github.event.head_commit.message, '[auto-docs]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 50  # enough history for changelog generation
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install documentation dependencies
        # Single-sourced via pyproject.toml ``[project.optional-dependencies].docs``
        # so the workflow cannot drift from the declared supported versions
        # (audit 2c).  Adding a new doc dep means updating pyproject only.
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[docs]"

      - name: Run auto-documentation updater
        run: python tools/update_docs.py

      # Publish the Python API reference generated from docs/api/*.rst.
      # AMA_SPHINX_BUILD=1 lifts INVARIANT-7 import guards for autodoc only;
      # -W --keep-going fails the build on any Sphinx regression so new
      # docstring-format issues cannot ship silently.
      - name: Build Sphinx HTML (Python API reference)
        env:
          AMA_SPHINX_BUILD: '1'
        run: sphinx-build -W --keep-going -b html docs docs/_build/html

      - name: Upload Sphinx HTML artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sphinx-html
          path: docs/_build/html
          if-no-files-found: error

      - name: Create PR for doc updates
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Exit early if nothing changed
          if git diff --quiet; then
            echo "No documentation changes detected."
            exit 0
          fi

          BRANCH="auto-docs/update"

          # Configure git with token-authenticated remote (checkout@v6
          # credential persistence is unreliable for push operations)
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          # Create or reset the auto-docs branch
          git checkout -B "$BRANCH"
          git add -A
          git commit -m "[auto-docs] Update documentation"
          git push origin "$BRANCH" --force

          # Create PR only if one doesn't already exist for this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --title "[auto-docs] Update documentation" \
              --body "Automated documentation updates." \
              --base main \
              --head "$BRANCH"
          else
            echo "PR #${EXISTING_PR} already open for ${BRANCH}, skipping creation."
          fi
