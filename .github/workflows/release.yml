name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2.1.5)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve tag and version
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches pyproject.toml version
        run: |
          PY_VERSION=$(python3 -c "import tomllib,sys; print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$PY_VERSION" != "${{ steps.meta.outputs.version }}" ]; then
            echo "::error::Tag ${{ steps.meta.outputs.tag }} does not match pyproject.toml version $PY_VERSION"
            exit 1
          fi

      - name: Extract CHANGELOG section
        id: changelog
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          NOTES_FILE="$(mktemp)"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture && /^---[[:space:]]*$/ { exit }
            capture { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ -s "$NOTES_FILE" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          TITLE="AMA Cryptography ${TAG}"
          if [ "${{ steps.changelog.outputs.found }}" = "true" ]; then
            gh release create "$TAG" \
              --title "$TITLE" \
              --notes-file "${{ steps.changelog.outputs.path }}" \
              --verify-tag
          else
            gh release create "$TAG" \
              --title "$TITLE" \
              --generate-notes \
              --verify-tag
          fi
