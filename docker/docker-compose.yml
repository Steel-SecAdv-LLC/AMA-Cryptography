# Docker Compose configuration for AMA Cryptography

services:
  # Main AMA Cryptography service
  ama-cryptography:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ama-cryptography:latest
    container_name: ama-cryptography-main
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /app/__pycache__:size=16m
    volumes:
      - ../data:/data
      - ../logs:/var/log/ama-cryptography
    environment:
      - AMA_LOG_LEVEL=INFO
      - AMA_DATA_DIR=/data
      - PYTHONDONTWRITEBYTECODE=1
    networks:
      - ama-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import ama_cryptography"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Monitoring service
  ama-monitor:
    image: ama-cryptography:latest
    container_name: ama-cryptography-monitor
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    command: python3 /app/ama_cryptography_monitor_demo.py
    volumes:
      - ../data:/data
      - ../logs:/var/log/ama-cryptography
    networks:
      - ama-net
    depends_on:
      - ama-cryptography

  # Benchmark service (run periodically)
  ama-benchmark:
    image: ama-cryptography:latest
    container_name: ama-cryptography-benchmark
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    command: python3 /app/benchmark_suite.py
    volumes:
      - ../data:/data
      - ../benchmarks:/app/benchmarks
    networks:
      - ama-net
    profiles:
      - benchmark

networks:
  ama-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  data:
  logs:
  benchmarks:
