[build-system]
requires = ["setuptools>=61.0", "wheel", "Cython>=3.0.0", "numpy>=1.24.0,<3.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ama-cryptography"
version = "2.0"
description = "Quantum-resistant cryptographic protection system for helical mathematical Omni-Codes"
readme = "README.md"
license = {text = "Apache-2.0"}
authors = [
    {name = "Andrew E. A.", email = "steel.sa.llc@gmail.com"}
]
maintainers = [
    {name = "Steel Security Advisors LLC", email = "steel.sa.llc@gmail.com"}
]
keywords = [
    "cryptography",
    "quantum-resistant",
    "post-quantum-cryptography",
    "dilithium",
    "ml-dsa",
    "kyber",
    "ml-kem",
    "sphincs",
    "ed25519",
    "aes-gcm",
    "sha3",
    "hmac",
    "pqc",
    "security",
    "integrity-protection",
    "digital-signatures"
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: C",
    "Programming Language :: Cython",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security :: Cryptography",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed"
]
requires-python = ">=3.8"
dependencies = []

[project.optional-dependencies]
monitoring = [
    # NumPy/SciPy for mathematical monitoring (equations, double_helix_engine)
    # Install with: pip install "ama-cryptography[monitoring]"
    "numpy>=1.24.0,<3.0.0",
    "scipy>=1.7.0",
]
legacy = [
    # PyCA cryptography — only needed as fallback when native C library is not
    # available. Ed25519 and AES-256-GCM are now provided natively.
    # Install with: pip install "ama-cryptography[legacy]"
    "cryptography>=41.0.0",
]
hsm = [
    # PKCS#11 support for hardware security modules
    "PyKCS11>=1.5.0",
]
secure-memory = [
    # PyNaCl for enhanced secure memory operations (libsodium bindings)
    # Provides memory locking, secure zeroing, and constant-time comparison
    "pynacl>=1.5.0",
]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-timeout>=2.1.0",
    "pytest-benchmark>=4.0.0",
    "pytest-xdist>=3.0.0",
    "hypothesis>=6.0.0",
    "black==25.11.0; python_version >= '3.9'",
    "ruff>=0.4.0",
    "mypy>=1.9.0",
    "isort>=5.12.0",
    "bandit>=1.7.0",
    "safety>=2.3.0",
    "numpy>=1.24.0,<2.0.0; python_version < '3.9'",
    "numpy>=1.24.0; python_version >= '3.9'",
    "scipy>=1.10.0,<1.11.0; python_version < '3.9'",
    "scipy>=1.11.0; python_version >= '3.9'",
]

[project.urls]
Homepage = "https://github.com/Steel-SecAdv-LLC/AMA-Cryptography"
Documentation = "https://github.com/Steel-SecAdv-LLC/AMA-Cryptography/blob/main/README.md"
Repository = "https://github.com/Steel-SecAdv-LLC/AMA-Cryptography"
Issues = "https://github.com/Steel-SecAdv-LLC/AMA-Cryptography/issues"

# Ruff configuration — replaces flake8, isort
[tool.ruff]
target-version = "py39"
line-length = 100
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "S",   # flake8-bandit (security)
    "N",   # pep8-naming
    "RUF", # ruff-specific rules
]
ignore = []  # Do not add ignores without a comment explaining why.

[tool.ruff.per-file-ignores]
# assert is valid in pytest tests
"tests/*" = ["S101"]
# ama_cryptography/ uses intentional patterns that must not be changed:
#   N803/N806: uppercase variable names for crypto constants (e.g. R, S, A, K)
#   RUF001/RUF002/RUF003: Unicode symbols in docstrings/comments (σ, ✓, etc.)
#   S101: assert used in internal validation
#   S106/S107: hardcoded defaults for optional password parameters
#   S110: bare except:pass in optional-feature fallback paths
#   E501: long lines in crypto constant definitions
#   B904: raise-without-from in chained exception handlers (existing pattern)
#   B028: no-explicit-stacklevel in warnings (existing pattern)
#   RUF012: mutable class defaults (dataclass pattern)
#   N818: exception naming convention (existing names)
#   UP015: redundant open modes (existing pattern)
#   RUF010: explicit f-string type conversion (existing pattern)
#   RUF022: unsorted __all__ (existing order is logical, not alphabetical)
#   RUF100: unused noqa directives (will be cleaned separately)
"ama_cryptography/*" = [
    "N803", "N806", "N818",
    "RUF001", "RUF002", "RUF003", "RUF010", "RUF012", "RUF022", "RUF100",
    "S101", "S106", "S107", "S110",
    "E501",
    "B028", "B904",
    "UP015",
]
# code_guardian_secure.py — same crypto patterns as ama_cryptography/
"code_guardian_secure.py" = [
    "N803", "N806", "N818",
    "RUF001", "RUF002", "RUF003", "RUF010", "RUF012", "RUF022", "RUF100",
    "S101", "S106", "S107", "S110",
    "E501",
    "B028", "B904",
    "UP015",
]

# Black configuration
[tool.black]
line-length = 100
target-version = ["py39"]
skip-string-normalization = false

# isort configuration (handled by ruff I rules, kept for standalone isort compat)
[tool.isort]
profile = "black"
line_length = 100

# MyPy configuration — strict mode
[tool.mypy]
python_version = "3.9"
strict = true
disallow_untyped_defs = true
disallow_any_generics = true
warn_return_any = true
warn_unused_ignores = true
warn_redundant_casts = true
disallow_untyped_calls = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
show_error_codes = true

# Per-module overrides ONLY for third-party stubs that do not exist.
# Do not add overrides to silence errors in ama_cryptography/ or tests/.
[[tool.mypy.overrides]]
module = "hypothesis.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "scipy.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "numpy.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "pytest_benchmark.*"
ignore_missing_imports = true

# Pytest configuration (consolidated from pytest.ini)
[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra --strict-markers --strict-config --showlocals --tb=short"
testpaths = [
    "tests",
]
python_files = [
    "test_*.py",
    "*_test.py",
]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "quantum: marks tests that require quantum-resistant libraries",
    "integration: marks integration tests",
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
    "ignore::UserWarning",
    "default::ama_cryptography.key_management.SecurityWarning",
]

# Coverage configuration
[tool.coverage.run]
source = ["."]
omit = [
    "*/tests/*",
    "*/test_*.py",
    "*/__pycache__/*",
    "*/venv/*",
    "*/.venv/*",
]

[tool.coverage.report]
precision = 2
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "if typing.TYPE_CHECKING:",
]
